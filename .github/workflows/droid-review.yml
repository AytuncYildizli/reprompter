name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: |
      github.event.pull_request.draft == false &&
      (
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Skip if FACTORY_API_KEY is unavailable (fork PR)
        if: ${{ !secrets.FACTORY_API_KEY }}
        run: |
          echo "::notice::FACTORY_API_KEY not available (likely a fork PR). Skipping."
          exit 0
      - name: Checkout repository
        if: ${{ secrets.FACTORY_API_KEY }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Run Droid Auto Review
        if: ${{ secrets.FACTORY_API_KEY }}
        uses: Factory-AI/droid-action@e3d1f5e7861c36fe4a9c4dca3edec87b964b2bc4 # v5
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          automatic_security_review: true
          review_depth: deep
